<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Indisponível</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#ea1d2c;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            text-align:center;
        }

        .caixa{

            padding:12px 25px;
            background:#ea1d2c;

            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#c91825;
        }

</head>
<body>

<div class="caixa">
    <h1>⚠ Página indisponível</h1>

    <p>
        Esta funcionalidade ainda não está disponível.
        Estamos trabalhando para disponibilizá-la em breve.
    </p>

    <button onclick="window.location.href='index.html'">
        Voltar ao início
    </button>
</div>

</body>
</html>
